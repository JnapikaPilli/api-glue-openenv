name: virtual-ops-manager
version: "1.1.0"
openenv: ">=0.2.0"
description: >
  An elite enterprise workflow simulator for testing complex operational reasoning. 
  Features procedural scenario generation, identity resolution, temporal SLAs, 
  and a multi-step knowledge-base search requirement.
author: Jnapika Pilli
license: MIT
tags:
  - customer-support
  - enterprise-workflow
  - procedural-generation
  - strategic-reasoning

# ── Environment interface ──────────────────────────────────────────────────
interface:
  reset:
    endpoint: POST /reset
    description: Resets the environment for a given task_id and seed.
    body:
      task_id:
        type: string
        enum: [easy_01, medium_01, hard_01, expert_01, expert_02]
      seed:
        type: integer
      hardcore:
        type: boolean

  step:
    endpoint: POST /step
    description: Executes one action. Returns observation, reward, done, info.
    body:
      action:
        type: string
        enum:
          - email_read
          - email_send
          - crm_lookup
          - ticket_create
          - kb_search
          - mark_spam
          - done
      email_id: {type: string}
      customer_id: {type: string}
      to: {type: string}
      kb_query: {type: string}
      reasoning: {type: string}

  state:
    endpoint: GET /state
    description: Returns current environment state.

# ── Observation space ──────────────────────────────────────────────────────
observation_space:
  emails:
    type: array
    items: {email_id: string, sender: string, subject: string, body: string, read: boolean}
  customers:
    type: array
    items: {customer_id: string, name: string, email: string, tier: string, account_status: string, security_note: string}
  kb_result:
    type: string
  step_number:
    type: integer
  task_id:
    type: string

# ── Action space ───────────────────────────────────────────────────────────
action_space:
  - name: email_read
    description: Retrieve email content.
  - name: crm_lookup
    description: Look up customer details by ID (Required before ticket_create).
  - name: kb_search
    description: Search specifically for internal ERR_ codes found in emails.
  - name: ticket_create
    description: Open a support ticket.
  - name: email_send
    description: Send a reply to the customer email address.
  - name: mark_spam
    description: Flag security threats or hijacked accounts.
  - name: done
    description: Signal completion.

# ── Tasks ──────────────────────────────────────────────────────────────────
tasks:
  - id: hard_01
    name: Full Procedural Triage
    difficulty: hard
    description: Handle multiple randomized customers requiring identity resolution and SLA management.
  
  - id: expert_02
    name: Strategic Fork (Elite)
    difficulty: expert
    description: Cross-reference CRM security notes to detect hijacked accounts requesting refunds.

# ── Runtime ────────────────────────────────────────────────────────────────
runtime:
  framework: fastapi
  python: "3.11"
  server: uvicorn
  port: 7860
  health_endpoint: GET /api/state
  inference_script: inference.py
